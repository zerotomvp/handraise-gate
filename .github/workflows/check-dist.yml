name: check-dist

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: verify dist/ is up to date
        run: git diff --exit-code dist/
